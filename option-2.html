<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option 02 — حياة 3D Event Visualization | RAWASI</title>
<meta name="description" content="Option 02: 25-frame 3D event visualization for the حياة launch event, Rawasi Developments, Mansoura, Mid-May 2026.">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" href="favicon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Artifika&family=Alyamama:wght@400;500;600;700;800;900&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy:   #1B2444;
    --navy-d: #0D1322;
    --navy-m: #111A2F;
    --gold:   #B8965A;
    --gold-l: #D4AF78;
    --gold-s: #8C6E3F;
    --green:  #6B7F4F;
    --cream:  #F7F3EC;
    --warm:   #F0EBE0;
    --off-w:  #FDFBF8;
    --f-head: 'Artifika', 'Montserrat', serif;
    --f-body: 'Montserrat', sans-serif;
    --f-ar:   'Alyamama', 'Noto Naskh Arabic', serif;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--navy-d);
    font-family: var(--f-body);
    -webkit-font-smoothing: antialiased;
    color: #fff;
    user-select: none;
  }

  /* ════════════════════════════════
     PRELOADER BAR
  ════════════════════════════════ */
  #preloader {
    position: fixed;
    top: 0; left: 0;
    width: 0%;
    height: 2px;
    background: linear-gradient(to right, var(--gold-s), var(--gold-l), var(--gold));
    z-index: 100;
    transition: width 300ms ease, opacity 400ms ease;
    opacity: 0;
    pointer-events: none;
  }
  #preloader.loading {
    opacity: 1;
  }

  /* ════════════════════════════════
     SLIDE DECK CONTAINER
  ════════════════════════════════ */
  #deck {
    position: fixed;
    inset: 0;
    background: var(--navy-d);
  }

  /* ── Slide wrapper ── */
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transform: translateX(20px);
    transition: opacity 380ms ease, transform 380ms ease;
    will-change: opacity, transform;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0);
  }
  .slide.exiting-left {
    opacity: 0;
    transform: translateX(-20px);
    pointer-events: none;
  }

  /* ── Slide image: full-bleed cover ── */
  .slide-img-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: var(--navy-d);
  }
  .slide-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  /* ── Caption strip ── */
  .slide-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 72px;
    background: rgba(13,19,34,0.78);
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 32px 0 28px;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 260ms ease 140ms, transform 260ms ease 140ms;
  }
  .slide.active .slide-caption {
    opacity: 1;
    transform: translateY(0);
  }

  .cap-frame-num {
    font-family: 'Courier New', 'Courier', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: -0.02em;
    line-height: 1;
    flex-shrink: 0;
    width: 38px;
    font-variant-numeric: tabular-nums;
  }
  .cap-divider {
    width: 1px;
    height: 32px;
    background: rgba(184,150,90,0.35);
    flex-shrink: 0;
  }
  .cap-labels {
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
  }
  .cap-section {
    font-family: var(--f-head);
    font-size: 15px;
    font-weight: 400;
    color: rgba(255,255,255,0.92);
    letter-spacing: 0.01em;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cap-view {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.46);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ════════════════════════════════
     CHROME LAYER
  ════════════════════════════════ */
  .chrome {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* ── Header band ── */
  .chrome-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to bottom, rgba(13,19,34,0.9) 0%, rgba(13,19,34,0) 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    pointer-events: auto;
  }
  .chrome-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 28px; right: 28px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(184,150,90,0.32), transparent);
  }
  .chrome-eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.38em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.85;
    font-family: var(--f-body);
  }
  .chrome-idx {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.24em;
    color: var(--gold);
    opacity: 0.55;
    font-variant-numeric: tabular-nums;
    font-family: 'Courier New', 'Courier', monospace;
  }

  /* ── Back to hub link ── */
  .back-hub {
    position: fixed;
    top: 18px;
    left: 28px;
    z-index: 20;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(184,150,90,0.5);
    text-decoration: none;
    pointer-events: auto;
    transition: color 250ms ease, opacity 250ms ease;
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .back-hub:hover { color: rgba(184,150,90,0.95); opacity: 1; }

  /* ── Footer band ── */
  .chrome-footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 84px;
    background: linear-gradient(to top, rgba(13,19,34,0.85) 0%, rgba(13,19,34,0) 100%);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 18px;
    pointer-events: auto;
  }

  /* ── Keyboard hint (bottom-left) ── */
  .chrome-hint {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.26);
    text-transform: uppercase;
    pointer-events: none;
  }

  /* ── Footer mark (bottom-right) ── */
  .chrome-footmark {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.28em;
    color: rgba(184,150,90,0.38);
    text-transform: uppercase;
    pointer-events: none;
    white-space: nowrap;
  }

  /* ── Nav buttons ── */
  .chrome-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    pointer-events: auto;
  }
  .nav-btn {
    background: rgba(13,19,34,0.65);
    border: 1px solid rgba(184,150,90,0.28);
    color: var(--gold);
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: background 200ms ease, border-color 200ms ease, color 200ms ease;
    flex-shrink: 0;
  }
  .nav-btn:hover {
    background: rgba(184,150,90,0.18);
    border-color: rgba(184,150,90,0.7);
    color: var(--gold-l);
  }
  .nav-btn:disabled {
    opacity: 0.22;
    cursor: default;
    pointer-events: none;
  }
  .nav-counter {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.28em;
    color: var(--gold);
    opacity: 0.5;
    font-variant-numeric: tabular-nums;
    font-family: 'Courier New', 'Courier', monospace;
    white-space: nowrap;
    min-width: 52px;
    text-align: center;
  }
  .fs-btn {
    background: rgba(13,19,34,0.65);
    border: 1px solid rgba(184,150,90,0.28);
    color: var(--gold);
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 200ms ease, border-color 200ms ease, color 200ms ease;
    margin-left: 4px;
  }
  .fs-btn:hover {
    background: rgba(184,150,90,0.18);
    border-color: rgba(184,150,90,0.7);
    color: var(--gold-l);
  }
  .fs-btn svg { width: 15px; height: 15px; }

  /* ── Click-zone hot areas ── */
  .click-zone {
    position: fixed;
    top: 60px;
    bottom: 84px;
    z-index: 5;
    cursor: pointer;
    pointer-events: auto;
  }
  .click-zone.left  { left: 0;  width: 13%; }
  .click-zone.right { right: 0; width: 50%; }

</style>
</head>
<body>

<!-- Preloader bar -->
<div id="preloader"></div>

<!-- Slide deck -->
<div id="deck">
  <!-- slides injected by JS -->
</div>

<!-- Chrome (fixed over everything) -->
<div class="chrome">

  <header class="chrome-header">
    <span class="chrome-eyebrow">RAWASI &middot; HAYAT &mdash; 3D VISUALIZATION</span>
    <span class="chrome-idx" id="hdr-idx">01 / 25</span>
  </header>

  <!-- Back to hub -->
  <a class="back-hub" href="index.html" id="back-hub-link">&#8592; Hub</a>

  <footer class="chrome-footer">
    <div class="chrome-hint">&#8592;&nbsp;/&nbsp;&#8594;&nbsp;arrow keys &middot; F for fullscreen &middot; ESC to exit</div>
    <div class="chrome-nav">
      <button class="nav-btn" id="btn-prev" title="Previous (&#8592;)" aria-label="Previous slide">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="8.5 1.5 3.5 6.5 8.5 11.5"/></svg>
      </button>
      <span class="nav-counter" id="nav-counter">01 / 25</span>
      <button class="nav-btn" id="btn-next" title="Next (&#8594;)" aria-label="Next slide">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4.5 1.5 9.5 6.5 4.5 11.5"/></svg>
      </button>
      <button class="fs-btn" id="fs-btn" title="Fullscreen (F)" aria-label="Toggle fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
          <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
          <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
          <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
      </button>
    </div>
    <span class="chrome-footmark">&copy; MMXXVI Strike Media &middot; For RAWASI Developments</span>
  </footer>

</div>

<!-- Click zones -->
<div class="click-zone left"  id="zone-prev"></div>
<div class="click-zone right" id="zone-next"></div>

<script>
(function () {
  'use strict';

  /* ── Slide data — exact spec mapping ── */
  var SLIDES = [
    { img: 'project/option2/page_01.jpg', section: 'Cover',         view: 'Co-Branding' },
    { img: 'project/option2/page_02.jpg', section: 'Exterior',      view: 'Front Elevation Night' },
    { img: 'project/option2/page_03.jpg', section: 'Exterior',      view: 'Front Elevation with Branded Wings' },
    { img: 'project/option2/page_04.jpg', section: 'Exterior',      view: 'Branded Facade with Moonlit Sky' },
    { img: 'project/option2/page_05.jpg', section: 'Exterior',      view: 'Branded Wing Detail' },
    { img: 'project/option2/page_06.jpg', section: 'Aerial',        view: 'Top-Down Plan View' },
    { img: 'project/option2/page_07.jpg', section: 'Aerial',        view: 'Layout Perspective' },
    { img: 'project/option2/page_08.jpg', section: 'Aerial',        view: 'Wide Layout' },
    { img: 'project/option2/page_09.jpg', section: 'Aerial',        view: 'Hero Pavilion Approach' },
    { img: 'project/option2/page_10.jpg', section: 'Aerial',        view: 'Final Wide View' },
    { img: 'project/option2/page_11.jpg', section: 'Approach',      view: 'Red Carpet Entry' },
    { img: 'project/option2/page_12.jpg', section: 'Approach',      view: 'Triangle Archway' },
    { img: 'project/option2/page_13.jpg', section: 'Approach',      view: 'Triangle Archway Hero' },
    { img: 'project/option2/page_14.jpg', section: 'Hero Monument', view: 'RAWASI Apex Sign' },
    { img: 'project/option2/page_15.jpg', section: 'Hero Monument', view: 'Apex Sign Side Detail' },
    { img: 'project/option2/page_16.jpg', section: 'Photo Op',      view: 'Hayat Wall' },
    { img: 'project/option2/page_17.jpg', section: 'Hospitality',   view: 'Coffee Station' },
    { img: 'project/option2/page_18.jpg', section: 'Hospitality',   view: 'Hayat Feature Wall' },
    { img: 'project/option2/page_19.jpg', section: 'Main Hall',     view: 'Stage from Audience' },
    { img: 'project/option2/page_20.jpg', section: 'Main Hall',     view: 'Banquet Setup with LED Wall' },
    { img: 'project/option2/page_21.jpg', section: 'Main Hall',     view: 'Stage Detail' },
    { img: 'project/option2/page_22.jpg', section: 'Main Hall',     view: 'Audience Perspective' },
    { img: 'project/option2/page_23.jpg', section: 'Networking',    view: 'Side View' },
    { img: 'project/option2/page_24.jpg', section: 'Networking',    view: 'Photo Op Detail' },
    { img: 'project/option2/page_25.jpg', section: 'Closing',       view: 'Co-Branding' }
  ];

  var TOTAL   = SLIDES.length;
  var current = 0;

  /* ── Build DOM ── */
  var deck = document.getElementById('deck');

  SLIDES.forEach(function (s, i) {
    var slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.id = 'slide-' + i;

    /* Image wrap */
    var wrap = document.createElement('div');
    wrap.className = 'slide-img-wrap';

    var img = document.createElement('img');
    img.src      = s.img;
    img.alt      = s.section + ' — ' + s.view;
    img.width    = 1840;
    img.height   = 1036;
    img.decoding = 'async';
    img.loading  = (i === 0) ? 'eager' : 'lazy';

    wrap.appendChild(img);
    slide.appendChild(wrap);

    /* Caption strip */
    var cap = document.createElement('div');
    cap.className = 'slide-caption';

    var frameNum = document.createElement('div');
    frameNum.className   = 'cap-frame-num';
    frameNum.textContent = pad(i + 1);

    var divider = document.createElement('div');
    divider.className = 'cap-divider';

    var labels = document.createElement('div');
    labels.className = 'cap-labels';

    var secEl = document.createElement('div');
    secEl.className   = 'cap-section';
    secEl.textContent = s.section;

    var viewEl = document.createElement('div');
    viewEl.className   = 'cap-view';
    viewEl.textContent = s.view;

    labels.appendChild(secEl);
    labels.appendChild(viewEl);
    cap.appendChild(frameNum);
    cap.appendChild(divider);
    cap.appendChild(labels);
    slide.appendChild(cap);
    deck.appendChild(slide);
  });

  /* ── UI refs ── */
  var hdrIdx     = document.getElementById('hdr-idx');
  var navCounter = document.getElementById('nav-counter');
  var btnPrev    = document.getElementById('btn-prev');
  var btnNext    = document.getElementById('btn-next');
  var fsBtn      = document.getElementById('fs-btn');
  var zonePrev   = document.getElementById('zone-prev');
  var zoneNext   = document.getElementById('zone-next');
  var preloader  = document.getElementById('preloader');

  /* ── Helpers ── */
  function pad(n) {
    return String(n).padStart(2, '0');
  }

  function updateChrome() {
    var label          = pad(current + 1) + ' / ' + pad(TOTAL);
    hdrIdx.textContent     = label;
    navCounter.textContent = label;
    btnPrev.disabled = (current === 0);
    btnNext.disabled = (current === TOTAL - 1);
  }

  /* Preload adjacent slides */
  function preloadAdjacent(idx) {
    [-1, 1, 2].forEach(function (delta) {
      var ni = idx + delta;
      if (ni >= 0 && ni < TOTAL) {
        var el = document.querySelector('#slide-' + ni + ' img');
        if (el && el.loading === 'lazy') {
          el.loading = 'eager';
        }
      }
    });
  }

  /* Preloader bar */
  var preloaderTimer = null;
  function showPreloader() {
    if (preloaderTimer) clearTimeout(preloaderTimer);
    preloader.style.transition = 'none';
    preloader.style.width = '0%';
    preloader.classList.add('loading');
    requestAnimationFrame(function () {
      preloader.style.transition = 'width 600ms ease, opacity 400ms ease';
      preloader.style.width = '80%';
    });
  }
  function hidePreloader() {
    preloader.style.width = '100%';
    preloaderTimer = setTimeout(function () {
      preloader.classList.remove('loading');
      preloader.style.width = '0%';
    }, 400);
  }

  /* ── Navigate ── */
  function goTo(target, dir) {
    if (target < 0 || target >= TOTAL || target === current) return;

    var oldSlide = document.getElementById('slide-' + current);
    oldSlide.classList.remove('active');
    if (dir >= 0) {
      oldSlide.classList.add('exiting-left');
    }
    setTimeout(function () {
      oldSlide.classList.remove('exiting-left');
    }, 420);

    current = target;

    var newSlide = document.getElementById('slide-' + current);
    if (dir < 0) {
      /* Reverse: arrive from left */
      newSlide.style.transform = 'translateX(-20px)';
      void newSlide.offsetWidth;
      newSlide.style.transform = '';
    }
    newSlide.classList.remove('exiting-left');
    void newSlide.offsetWidth;
    newSlide.classList.add('active');

    /* Preloader for image if not yet loaded */
    var nextImg = document.querySelector('#slide-' + current + ' img');
    if (nextImg && !nextImg.complete) {
      showPreloader();
      nextImg.addEventListener('load',  hidePreloader, { once: true });
      nextImg.addEventListener('error', hidePreloader, { once: true });
    }

    updateChrome();
    preloadAdjacent(current);
  }

  function goPrev() { goTo(current - 1, -1); }
  function goNext() { goTo(current + 1,  1); }

  /* ── Button events ── */
  btnPrev.addEventListener('click', goPrev);
  btnNext.addEventListener('click', goNext);
  zonePrev.addEventListener('click', goPrev);
  zoneNext.addEventListener('click', goNext);

  /* ── Keyboard ── */
  document.addEventListener('keydown', function (e) {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    switch (e.key) {
      case 'ArrowLeft':
      case 'PageUp':
        e.preventDefault(); goPrev(); break;
      case 'ArrowRight':
      case 'PageDown':
      case ' ':
        e.preventDefault(); goNext(); break;
      case 'Home':
        e.preventDefault(); goTo(0, -1); break;
      case 'End':
        e.preventDefault(); goTo(TOTAL - 1, 1); break;
      case 'Escape':
        if (document.fullscreenElement) {
          document.exitFullscreen && document.exitFullscreen();
        } else {
          window.location.href = 'index.html';
        }
        break;
      case 'f':
      case 'F':
        e.preventDefault(); toggleFullscreen(); break;
    }
  });

  /* ── Fullscreen ── */
  var iconEnter = '<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>';
  var iconExit  = '<path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>';

  function updateFsIcon() {
    var svg = fsBtn.querySelector('svg');
    svg.innerHTML = document.fullscreenElement ? iconExit : iconEnter;
    fsBtn.title   = document.fullscreenElement ? 'Exit fullscreen (F)' : 'Enter fullscreen (F)';
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen && document.exitFullscreen();
    }
  }

  fsBtn.addEventListener('click', toggleFullscreen);
  document.addEventListener('fullscreenchange', updateFsIcon);
  updateFsIcon();

  /* ── ?fs=1 auto-fullscreen on first gesture ── */
  if (/[?&]fs=1/.test(location.search)) {
    var fsOnce = function () {
      document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
    };
    document.addEventListener('click',   fsOnce, { once: true });
    document.addEventListener('keydown', fsOnce, { once: true });
  }

  /* ── Init ── */
  updateChrome();
  preloadAdjacent(0);

})();
</script>

</body>
</html>
